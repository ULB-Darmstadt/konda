{{ define "search-domains" }}
<div class="border border-base-300 shadow-md rounded-lg mb-2 flex flex-col max-h-96 overflow-y-auto">
    {{ range . }}
    <div
         @click="query = '{{ . }}'"
         class="flex items-center cursor-pointer rounded-lg hover:bg-base-200 text-base-content">
        <span class="p-3 ml-2">
            {{ . }}
        </span>
    </div>
    {{ end }}
</div>
{{ end }}
